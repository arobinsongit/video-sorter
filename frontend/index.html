<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Sorter</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-thumb { background: #444; }
    ::-webkit-scrollbar-thumb { background: #bbb; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #999; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #666; }
  </style>
</head>
<body class="bg-white dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 h-screen overflow-hidden transition-colors">

<!-- Top bar -->
<div class="flex items-center gap-3 px-4 py-3 bg-neutral-100 dark:bg-neutral-900 border-b-2 border-neutral-300 dark:border-neutral-700">
  <input id="dirInput" type="text"
    class="flex-1 h-10 px-3 text-sm bg-white dark:bg-neutral-950 border border-neutral-300 dark:border-neutral-700 rounded-lg text-neutral-900 dark:text-neutral-100 placeholder:text-neutral-400 dark:placeholder:text-neutral-600 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-600"
    placeholder="Paste folder path here (e.g. C:\Videos\Game1)" />
  <button id="btnLoad"
    class="h-10 px-5 text-sm font-semibold rounded-lg bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 hover:bg-neutral-700 dark:hover:bg-neutral-300 transition-colors">
    Load
  </button>
  <button id="btnOpenFolder" title="Open folder in file explorer"
    class="h-10 w-10 flex items-center justify-center rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors text-base">
    &#128193;
  </button>
  <div class="h-6 w-px bg-neutral-300 dark:bg-neutral-700"></div>
  <span id="fileCounter" class="text-xs font-medium text-neutral-500 whitespace-nowrap"></span>
  <div class="h-6 w-px bg-neutral-300 dark:bg-neutral-700"></div>
  <button id="btnSettings" title="Project settings"
    class="h-10 w-10 flex items-center justify-center rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-800 text-neutral-500 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors text-lg">
    &#9881;
  </button>
  <button id="btnTheme" title="Toggle dark mode"
    class="h-10 w-10 flex items-center justify-center rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-800 text-neutral-500 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors text-lg">
    <span id="themeIcon">&#9789;</span>
  </button>
</div>

<!-- Main layout -->
<div class="flex" style="height: calc(100vh - 52px)">
  <!-- Left: video + file list -->
  <div class="flex-1 flex flex-col min-w-0 border-r border-neutral-200 dark:border-neutral-800">
    <div class="flex-1 bg-black flex items-center justify-center min-h-0">
      <video id="videoPlayer" controls class="max-w-full max-h-full"></video>
      <div id="noVideo" class="text-neutral-500 text-sm">Paste a folder path and click Load</div>
    </div>
    <div id="currentFileName" class="px-4 py-2.5 bg-neutral-50 dark:bg-neutral-900 text-sm font-semibold text-neutral-900 dark:text-neutral-100 border-t-2 border-b border-neutral-300 dark:border-neutral-700 truncate"></div>
    <div id="splitHandle" class="h-1.5 bg-neutral-300 dark:bg-neutral-600 hover:bg-neutral-400 dark:hover:bg-neutral-500 cursor-row-resize flex-shrink-0 transition-colors"></div>
    <div class="flex items-center bg-neutral-50 dark:bg-neutral-900 border-t border-neutral-200 dark:border-neutral-800 flex-shrink-0">
      <input id="fileFilter" type="text" placeholder="Filter files..."
        class="flex-1 px-3 py-1.5 text-xs bg-transparent text-neutral-700 dark:text-neutral-300 placeholder:text-neutral-400 dark:placeholder:text-neutral-600 focus:outline-none" />
    </div>
    <div id="fileList" style="height:150px" class="overflow-y-auto bg-neutral-50 dark:bg-neutral-900 border-t border-neutral-200 dark:border-neutral-800 flex-shrink-0">
      <table class="w-full text-xs border-collapse" style="table-layout:fixed">
        <thead class="sticky top-0 bg-neutral-100 dark:bg-neutral-800 text-[10px] uppercase tracking-wide font-medium text-neutral-500 select-none">
          <tr>
            <th id="colName" class="text-left px-3 py-1 cursor-pointer hover:text-neutral-800 dark:hover:text-neutral-200 font-medium whitespace-nowrap">Name <span id="colNameSort"></span></th>
            <th id="colSize" style="width:80px" class="text-right px-3 py-1 cursor-pointer hover:text-neutral-800 dark:hover:text-neutral-200 font-medium whitespace-nowrap">Size <span id="colSizeSort"></span></th>
            <th id="colDate" style="width:130px" class="text-right px-3 py-1 cursor-pointer hover:text-neutral-800 dark:hover:text-neutral-200 font-medium whitespace-nowrap">Modified <span id="colDateSort"></span></th>
          </tr>
        </thead>
        <tbody id="fileListBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Right: controls -->
  <div class="w-[420px] flex flex-col overflow-y-auto p-5 gap-4 bg-white dark:bg-neutral-950 border-l border-neutral-200 dark:border-neutral-800">
    <div class="flex gap-2 items-center">
      <button id="btnPrev" disabled
        class="h-9 px-4 text-sm rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 disabled:opacity-20 disabled:cursor-not-allowed transition-colors">
        &larr; Prev
      </button>
      <button id="btnNext" disabled
        class="h-9 px-4 text-sm rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 disabled:opacity-20 disabled:cursor-not-allowed transition-colors">
        Next &rarr;
      </button>
      <span id="navInfo" class="text-xs font-medium text-neutral-500 ml-auto"></span>
    </div>

    <hr class="border-neutral-200 dark:border-neutral-800" />

    <div id="groupsContainer" class="flex flex-col gap-4"></div>

    <hr class="border-neutral-200 dark:border-neutral-800" />

    <div class="rounded-lg border-2 border-neutral-300 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-900 px-4 py-3">
      <div class="text-[10px] uppercase tracking-wider font-semibold text-neutral-500 dark:text-neutral-500 mb-1.5">New filename</div>
      <div id="previewName" class="text-sm font-mono font-medium text-neutral-800 dark:text-neutral-200 break-all">-</div>
    </div>

    <div class="flex gap-2.5">
      <button id="btnReset"
        class="flex-1 h-11 text-sm font-medium rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors">
        Reset
      </button>
      <button id="btnSkip"
        class="flex-1 h-11 text-sm font-medium rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors">
        Skip
      </button>
      <button id="btnApply" disabled
        class="flex-1 h-11 text-sm font-semibold rounded-lg bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 hover:bg-neutral-700 dark:hover:bg-neutral-300 disabled:bg-neutral-200 dark:disabled:bg-neutral-800 disabled:text-neutral-400 dark:disabled:text-neutral-600 disabled:cursor-not-allowed transition-colors">
        Apply &amp; Next
      </button>
    </div>
  </div>
</div>

<!-- Add-option modal -->
<div id="modal" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 items-center justify-center hidden">
  <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-lg p-6 min-w-[320px] shadow-xl">
    <h3 id="modalTitle" class="text-sm font-medium text-neutral-900 dark:text-neutral-100 mb-3">Add Option</h3>
    <input id="modalInput" type="text"
      class="w-full h-9 px-3 text-sm bg-neutral-50 dark:bg-neutral-950 border border-neutral-300 dark:border-neutral-700 rounded-md text-neutral-900 dark:text-neutral-100 placeholder:text-neutral-400 dark:placeholder:text-neutral-600 focus:outline-none focus:ring-1 focus:ring-neutral-400 dark:focus:ring-neutral-600 mb-3"
      placeholder="Enter value..." />
    <div class="flex gap-2">
      <button id="modalCancel"
        class="flex-1 h-9 text-sm rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors">
        Cancel
      </button>
      <button id="modalConfirm"
        class="flex-1 h-9 text-sm font-medium rounded-md bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 hover:bg-neutral-700 dark:hover:bg-neutral-300 transition-colors">
        Add
      </button>
    </div>
  </div>
</div>

<!-- Config editor modal -->
<div id="configEditor" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-40 items-center justify-center hidden">
  <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-lg shadow-xl w-[600px] max-h-[80vh] overflow-y-auto">
    <div class="sticky top-0 bg-white dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-700 px-6 py-4 flex justify-between items-center">
      <h2 class="text-sm font-semibold text-neutral-900 dark:text-neutral-100">Project Settings</h2>
      <button id="configEditorClose" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 text-lg leading-none cursor-pointer">&times;</button>
    </div>
    <div id="configEditorContent" class="p-6"></div>
  </div>
</div>

<script src="app.min.js"></script>
</body>
</html>
