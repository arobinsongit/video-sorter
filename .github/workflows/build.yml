name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: |
          npm install
          npm run build

      - name: Build all platforms
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/video-sorter-windows.exe .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/video-sorter-mac-intel .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/video-sorter-mac-arm .
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/video-sorter-linux .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-sorter-builds
          path: dist/

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: "Automated build from commit ${{ github.sha }}"
          files: dist/*
