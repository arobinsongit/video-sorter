<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Film strip perforations - left -->
  <rect x="12" y="20" width="8" height="6" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="12" y="34" width="8" height="6" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="12" y="48" width="8" height="6" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="12" y="62" width="8" height="6" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="12" y="76" width="8" height="6" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="12" y="90" width="8" height="6" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Play triangle -->
  <polygon points="46,32 46,88 90,60" fill="white" opacity="0.95"/>
  <!-- Tag element - bottom right -->
  <g transform="translate(78,78)">
    <rect x="0" y="0" width="42" height="28" rx="6" fill="url(#tag)" stroke="white" stroke-width="2.5"/>
    <!-- Tag hole -->
    <circle cx="10" cy="14" r="3.5" fill="white" opacity="0.9"/>
    <!-- Tag lines -->
    <line x1="19" y1="10" x2="35" y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="19" y1="18" x2="30" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
